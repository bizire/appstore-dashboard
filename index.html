<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Chart Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 1.5rem; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 24px; font-size: 0.9rem; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 22px;
            text-align: center;
            min-width: 130px;
        }
        .stat-card .label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; }
        .stat-card .value { font-size: 1.6rem; font-weight: 700; margin-top: 4px; }
        .stat-card .value.total { color: #58a6ff; }
        .stat-card .value.first { color: #f1c40f; }
        .stat-card .value.second { color: #bdc3c7; }
        .stat-card .value.other { color: #8b949e; }
        .period-selector, .filter-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: #fff;
        }
        .chart-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-container h2 { font-size: 0.95rem; margin-bottom: 12px; color: #8b949e; }
        .table-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .table-container h2 { font-size: 0.95rem; margin-bottom: 12px; color: #8b949e; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        th, td {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid #21262d;
        }
        th {
            color: #8b949e;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
        }
        td.time { color: #8b949e; font-variant-numeric: tabular-nums; white-space: nowrap; }
        td.app { font-weight: 600; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.free { background: rgba(88, 166, 255, 0.15); color: #58a6ff; }
        .badge.paid { background: rgba(210, 153, 34, 0.15); color: #d29922; }
        .badge.first { background: rgba(241, 196, 15, 0.18); color: #f1c40f; }
        .badge.second { background: rgba(189, 195, 199, 0.18); color: #dde4e6; }
        .badge.other { background: rgba(139, 148, 158, 0.18); color: #8b949e; }
        .btn.trading-day {
            border-color: rgba(63, 185, 80, 0.45);
            color: #7ee787;
        }
        .btn.trading-day.active {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }
        .rank-delta .up { color: #3fb950; }
        .rank-delta .down { color: #f85149; }
        .empty { text-align: center; color: #484f58; padding: 24px; }
        .last-update { text-align: center; color: #484f58; font-size: 0.75rem; margin-top: 16px; }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <h1>App Store Chart Monitor</h1>
    <p class="subtitle">US iPhone · Top Free & Top Paid · times in US/Eastern</p>

    <div class="stats">
        <div class="stat-card">
            <div class="label">Events</div>
            <div class="value total" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <div class="label">1st changes</div>
            <div class="value first" id="stat-first">0</div>
        </div>
        <div class="stat-card">
            <div class="label">2nd changes</div>
            <div class="value second" id="stat-second">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Other</div>
            <div class="value other" id="stat-other">0</div>
        </div>
    </div>

    <div class="period-selector">
        <button class="btn" data-hours="24">24h</button>
        <button class="btn" data-hours="72">3d</button>
        <button class="btn active" data-hours="168">7d</button>
        <button class="btn" data-hours="720">30d</button>
        <button class="btn" data-hours="0">All</button>
    </div>

    <div class="filter-row">
        <button class="btn chart-filter active" data-chart="all">All charts</button>
        <button class="btn chart-filter" data-chart="free">Free</button>
        <button class="btn chart-filter" data-chart="paid">Paid</button>
    </div>

    <div class="filter-row">
        <button class="btn type-filter active" data-type="all">All events</button>
        <button class="btn type-filter" data-type="1st">1st</button>
        <button class="btn type-filter" data-type="2nd">2nd</button>
        <button class="btn type-filter" data-type="other">Other</button>
    </div>

    <div class="filter-row">
        <button class="btn day-filter active" data-day="all">All days</button>
        <button class="btn day-filter" data-day="Mon">Mon</button>
        <button class="btn day-filter trading-day" data-day="Tue">Tue</button>
        <button class="btn day-filter" data-day="Wed">Wed</button>
        <button class="btn day-filter" data-day="Thu">Thu</button>
        <button class="btn day-filter trading-day" data-day="Fri">Fri</button>
        <button class="btn day-filter" data-day="Sat">Sat</button>
        <button class="btn day-filter" data-day="Sun">Sun</button>
    </div>

    <div class="chart-container">
        <h2>Events by day of week (US/Eastern)</h2>
        <canvas id="weekday-histogram"></canvas>
    </div>

    <div class="chart-container">
        <h2>Events by hour of day (US/Eastern)</h2>
        <canvas id="histogram"></canvas>
    </div>

    <div class="table-container">
        <h2>Recent events</h2>
        <table id="events-table">
            <thead>
                <tr>
                    <th>Time (ET)</th>
                    <th>Chart</th>
                    <th>Event</th>
                    <th>Position</th>
                    <th>Change</th>
                </tr>
            </thead>
            <tbody id="events-tbody"></tbody>
        </table>
        <div class="pagination">
            <button class="btn" id="show-more">Show more</button>
        </div>
    </div>

    <div class="last-update" id="last-update"></div>

    <script>
        const TZ = 'America/New_York';
        let allEvents = [];
        let periodHours = 168;
        let chartFilter = 'all';
        let typeFilter = 'all';
        let dayFilter = 'all';
        let visibleCount = 100;
        let histogramChart = null;
        let weekdayChart = null;

        const WEEKDAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        const fmtTime = new Intl.DateTimeFormat('en-US', {
            timeZone: TZ,
            month: 'short', day: '2-digit',
            hour: '2-digit', minute: '2-digit',
            hour12: false,
        });

        function hourInET(iso) {
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: TZ, hour: '2-digit', hour12: false,
            }).formatToParts(new Date(iso));
            const h = parts.find(p => p.type === 'hour').value;
            return parseInt(h, 10) % 24;
        }

        function weekdayInET(iso) {
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: TZ, weekday: 'short',
            }).formatToParts(new Date(iso));
            return parts.find(p => p.type === 'weekday').value;
        }

        async function loadData() {
            const resp = await fetch('data/events.json?t=' + Date.now());
            allEvents = await resp.json();
            render();
        }

        function filterEvents(opts = {}) {
            const cutoff = periodHours === 0 ? 0 : Date.now() - periodHours * 3600 * 1000;
            return allEvents.filter(e => {
                if (new Date(e.ts).getTime() < cutoff) return false;
                if (chartFilter !== 'all' && e.chart !== chartFilter) return false;
                if (typeFilter !== 'all' && e.type !== typeFilter) return false;
                if (!opts.ignoreDay && dayFilter !== 'all' && weekdayInET(e.ts) !== dayFilter) return false;
                return true;
            });
        }

        function render() {
            const filtered = filterEvents();
            const filteredNoDay = filterEvents({ ignoreDay: true });
            renderStats(filtered);
            renderHistogram(filtered);
            renderWeekdayHistogram(filteredNoDay);
            renderTable(filtered);
            if (allEvents.length > 0) {
                const last = allEvents[allEvents.length - 1];
                document.getElementById('last-update').textContent =
                    'Last update: ' + fmtTime.format(new Date(last.ts)) + ' ET · ' +
                    allEvents.length + ' total events';
            }
        }

        function renderStats(events) {
            document.getElementById('stat-total').textContent = events.length;
            document.getElementById('stat-first').textContent = events.filter(e => e.type === '1st').length;
            document.getElementById('stat-second').textContent = events.filter(e => e.type === '2nd').length;
            document.getElementById('stat-other').textContent = events.filter(e => e.type === 'other').length;
        }

        const TYPE_CLASS = { '1st': 'first', '2nd': 'second', 'other': 'other' };

        function renderHistogram(events) {
            const buckets = new Array(24).fill(0);
            for (const e of events) buckets[hourInET(e.ts)]++;

            if (histogramChart) histogramChart.destroy();
            histogramChart = new Chart(document.getElementById('histogram'), {
                type: 'bar',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i.toString().padStart(2, '0') + ':00'),
                    datasets: [{
                        label: 'Events',
                        data: buckets,
                        backgroundColor: 'rgba(88, 166, 255, 0.6)',
                        borderColor: '#58a6ff',
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
                        y: {
                            grid: { color: '#21262d' },
                            ticks: { color: '#8b949e', precision: 0 },
                            beginAtZero: true,
                        }
                    }
                }
            });
        }

        function renderWeekdayHistogram(events) {
            const counts = Object.fromEntries(WEEKDAYS.map(d => [d, 0]));
            for (const e of events) {
                const w = weekdayInET(e.ts);
                if (w in counts) counts[w]++;
            }
            const data = WEEKDAYS.map(d => counts[d]);
            const bg = WEEKDAYS.map(d => {
                const isTrading = d === 'Tue' || d === 'Fri';
                const isSelected = dayFilter === d;
                const dim = dayFilter !== 'all' && !isSelected;
                if (isTrading) return dim ? 'rgba(63, 185, 80, 0.2)' : 'rgba(63, 185, 80, 0.65)';
                return dim ? 'rgba(88, 166, 255, 0.2)' : 'rgba(88, 166, 255, 0.6)';
            });
            const border = WEEKDAYS.map(d =>
                d === 'Tue' || d === 'Fri' ? '#3fb950' : '#58a6ff'
            );

            if (weekdayChart) weekdayChart.destroy();
            weekdayChart = new Chart(document.getElementById('weekday-histogram'), {
                type: 'bar',
                data: {
                    labels: WEEKDAYS,
                    datasets: [{
                        label: 'Events',
                        data,
                        backgroundColor: bg,
                        borderColor: border,
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
                        y: {
                            grid: { color: '#21262d' },
                            ticks: { color: '#8b949e', precision: 0 },
                            beginAtZero: true,
                        }
                    }
                }
            });
        }

        function changeCell(e) {
            const from = e.from ? escapeHtml(e.from) : '<span class="rank-delta">—</span>';
            const to = e.to ? escapeHtml(e.to) : '<span class="rank-delta">—</span>';
            return `${from} <span class="rank-delta">→</span> <b>${to}</b>`;
        }

        function renderTable(events) {
            const tbody = document.getElementById('events-tbody');
            if (events.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">No events in this period</td></tr>';
                document.getElementById('show-more').style.display = 'none';
                return;
            }
            const sorted = [...events].reverse();
            const slice = sorted.slice(0, visibleCount);
            tbody.innerHTML = slice.map(e => {
                const cls = TYPE_CLASS[e.type] || 'other';
                return `
                <tr>
                    <td class="time">${fmtTime.format(new Date(e.ts))}</td>
                    <td><span class="badge ${e.chart}">${e.chart}</span></td>
                    <td><span class="badge ${cls}">${e.type}</span></td>
                    <td>#${e.position}</td>
                    <td class="app">${changeCell(e)}</td>
                </tr>
            `;
            }).join('');
            document.getElementById('show-more').style.display =
                sorted.length > visibleCount ? 'inline-block' : 'none';
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        document.querySelectorAll('.period-selector .btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-selector .btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                periodHours = parseInt(btn.dataset.hours, 10);
                visibleCount = 100;
                render();
            });
        });
        document.querySelectorAll('.chart-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartFilter = btn.dataset.chart;
                visibleCount = 100;
                render();
            });
        });
        document.querySelectorAll('.type-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                typeFilter = btn.dataset.type;
                visibleCount = 100;
                render();
            });
        });
        document.querySelectorAll('.day-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.day-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                dayFilter = btn.dataset.day;
                visibleCount = 100;
                render();
            });
        });
        document.getElementById('show-more').addEventListener('click', () => {
            visibleCount += 100;
            render();
        });

        loadData();
    </script>
</body>
</html>
